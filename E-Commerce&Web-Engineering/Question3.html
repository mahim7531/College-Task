<!DOCTYPE html>
<html>
<head>
    <title>Simple CSS Website</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Internal CSS -->
    <style>
        h2 {
            color: darkblue;
            text-align: center;
        }

        table {
            width: 70%;
            margin: auto;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: lightgray;
        }
    </style>
</head>
<body>

    <!-- Inline CSS -->
    <h1 style="color:red; text-align:center;">
        Welcome to My Website
    </h1>

    <h2>CSS Demonstration</h2>

    <p class="para">
        This is a simple website showing
        <b>formatted text</b>,
        <i>italic text</i>,
        <u>underlined text</u>,
        and different CSS styles.
    </p>

    <h3>Student Information</h3>

    <table>
        <tr>
            <th>Name</th>
            <th>ID</th>
            <th>Department</th>
        </tr>
        <tr>
            <td>Mahim</td>
            <td>101</td>
            <td>CSE</td>
        </tr>
        <tr>
            <td>Rahim</td>
            <td>102</td>
            <td>EEE</td>
        </tr>
    </table>

    <br>

    <div class="links">
        <a href="https://www.google.com">Google</a>
        <a href="https://www.facebook.com">Facebook</a>
    </div>

</body>
</html>
